<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="explorerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14F195;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D4AA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#0a0e27" stroke="url(#explorerGradient)" stroke-width="8"/>
  
  <!-- Explorer symbol - compass-like design -->
  <g transform="translate(100, 100)">
    <!-- Outer circle -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="url(#explorerGradient)" stroke-width="6.5"/>
    
    <!-- Cardinal directions - simplified compass -->
    <line x1="0" y1="-28" x2="0" y2="-18" stroke="url(#explorerGradient)" stroke-width="6.5" stroke-linecap="round"/>
    <line x1="28" y1="0" x2="18" y2="0" stroke="url(#explorerGradient)" stroke-width="6.5" stroke-linecap="round"/>
    <line x1="0" y1="28" x2="0" y2="18" stroke="url(#explorerGradient)" stroke-width="6.5" stroke-linecap="round"/>
    <line x1="-28" y1="0" x2="-18" y2="0" stroke="url(#explorerGradient)" stroke-width="6.5" stroke-linecap="round"/>
    
    <!-- Center dot -->
    <circle cx="0" cy="0" r="8" fill="url(#explorerGradient)"/>
    
    <!-- Diagonal cross for exploration -->
    <line x1="-15" y1="-15" x2="-8" y2="-8" stroke="url(#explorerGradient)" stroke-width="4.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="15" y1="15" x2="8" y2="8" stroke="url(#explorerGradient)" stroke-width="4.5" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>

